name: Continuous Integration & Deployment Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Stage 1-3: Lint, Unit Tests & Agent Eval Benchmark Harness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Stage 1: Ruff Lint, Schema Verification & Mypy Static Type Checking
        run: |
          ruff check .
          mypy app/


      - name: Stage 2: Pytest Unit & Integration Test Suite
        run: |
          pytest tests/test_schemas.py tests/test_capacity.py tests/test_agents.py -v

      - name: Stage 3: Agent Eval Harness (95-Point Benchmark Gate)
        run: |
          pytest tests/test_eval_harness.py -v -s

  deploy-cloud-run:
    name: Stage 4: Keyless GCP Terraform & Cloud Run Deploy
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/123456789/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions-deployer@gtd-ef-agent-gcp-project.iam.gserviceaccount.com"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init & Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
